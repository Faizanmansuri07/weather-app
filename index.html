<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="icon" type="image/x-icon" href="weather-app.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <p class="header">Weather app</p>
               <div class="container">
                         <div class="input-list">
                                <input type="text" id="city" placeholder="Enter City name" required>
                                <button id="search">Check</button>
                         </div>
                       
                         <div class="info">
                            <p id="w-name">gbhh</p>
                         <div class="images box">
                            <img src="clouds.png" alt="" id="imega">
                    </div>
                    <div class="digree">
                        <p id="temp">22<sup>0</sup> C
                        </p>
                        <p id="place">New York</p>
                    </div>

                    <div class="other-info">
                        <div class="humanity">
                           
                                 <img src="humidity.png" alt="">
                                <div class="humanity-info">
                                     <p id="humanity">50%</p>
                                     <p id="h-header">Humidity</p>
                            </div>
                        </div>
                    
               
               <div class="wind-info">
                <div class="wind">
                    <img src="wind.png" alt="">

                    <div class="wind-info">
                        <p id="wind">15km/h</p>
                        <p id="w-header">Wind speed</p>
                    </div>
                </div>
               </div>
            </div>
            <p id="admin">Created By Faizan Mansuri</p>
            </div> 
          
    </main>
<footer>
      
</footer>
    <script src="script.js"></script>
</body>
</html>
